<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bud Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Game of Life Background Panel */
        
        .gol-panel {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0d0d0d;
            overflow: hidden;
            border-radius: 15px;
        }
        /* Canvas for Game of Life */
        
        .gol-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .gol-bg {
            position: absolute;
            z-index: 10;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0.5;
        }
        
        .gol-bg::after {
            content: "";
            position: absolute;
            bottom: -400px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: linear-gradient(90deg, #51169a 0%, #0a0411 100%);
            filter: blur(48.8px);
            transform: rotate(0deg);
            z-index: 1;
            animation: golMoveDown 8s ease-in-out infinite alternate;
        }
        
        .gol-bg::before {
            content: "";
            position: absolute;
            bottom: -270px;
            right: -50px;
            width: 500px;
            height: 500px;
            background: linear-gradient(90deg, #2011cb 0%, #472a9b 100%);
            mix-blend-mode: screen;
            filter: blur(48.8px);
            transform: rotate(45deg);
            z-index: 2;
            animation: golMoveUp 8s ease-in-out infinite alternate;
            border-radius: 30%;
            opacity: 0.6;
        }
        
        #gol-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #202020;
            opacity: 0.3;
        }
        /* Purple gradient overlays */
        
        .gol-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            opacity: 0.6;
        }
        
        .gol-overlay::after {
            content: "";
            position: absolute;
            bottom: -400px;
            left: -250px;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #51169a 0%, #0a0411 100%);
            filter: blur(48.8px);
            transform: rotate(318deg);
            animation: golMoveDown 8s ease-in-out infinite alternate;
        }
        
        .gol-overlay::before {
            content: "";
            position: absolute;
            bottom: -470px;
            right: -200px;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2011cb 0%, #472a9b 100%);
            mix-blend-mode: screen;
            filter: blur(48.8px);
            transform: rotate(145deg);
            animation: golMoveUp 8s ease-in-out infinite alternate;
            border-radius: 30%;
        }
        
        @keyframes golMoveUp {
            0% {
                transform: rotate(145deg) translateY(0);
            }
            100% {
                transform: rotate(145deg) translateY(-200px);
            }
        }
        
        @keyframes golMoveDown {
            0% {
                transform: rotate(318deg) translateX(500px);
            }
            100% {
                transform: rotate(318deg) translateX(200px);
            }
        }
        /* Content overlay */
        
        .content {
            position: relative;
            z-index: 30;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }
        /* Logo */
        
        .logo {
            width: 120px;
            height: auto;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        /* Loading indicator */
        
        .loading-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .loading-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            background: linear-gradient( 90deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 1) 50%, rgba(255, 255, 255, 0.3) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0% {
                background-position: 100% 0;
            }
            100% {
                background-position: -100% 0;
            }
        }
        /* Purple shadow decoration */
        /* .purple-shadow {
            position: absolute;
            bottom: -28em;
            left: -29em;
            transform: rotate(14deg);
            opacity: 0.3;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(150, 92, 222, 0.6) 0%, transparent 70%);
            pointer-events: none;
        } */
    </style>
</head>

<body>
    <div class="container">
        <div class="gol-panel">
            <!-- Game of Life Canvas -->
            <div class="gol-canvas-container">
                <div class="gol-bg"></div>
                <canvas id="gol-canvas"></canvas>
            </div>

            <!-- Purple gradient overlays -->
            <!-- <div class="gol-overlay"></div> -->

            <!-- Content -->
            <div class="content">
                <!-- <div class="purple-shadow"></div> -->

                <!-- Logo -->
                <img src="logo.png" alt="Bud Logo" class="logo">

                <!-- Loading -->
                <div class="loading-section">
                    <span class="loading-text">Setting up your workspace</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game of Life Animation
        (function() {
            const DESIRED_CELL_COUNT = 13;
            const GENERATION_INTERVAL = 1000;
            const FRAME_RATE = 75;
            const MAX_OPACITY = 0.3;
            const DEAD_COLOR = "#0d0d0d";

            const canvas = document.getElementById('gol-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            const CELL_SIZE = Math.min(window.innerWidth, window.innerHeight) / DESIRED_CELL_COUNT;
            const GRID_WIDTH = Math.ceil(window.innerWidth / CELL_SIZE);
            const GRID_HEIGHT = Math.ceil(window.innerHeight / CELL_SIZE);

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Initialize random grid
            let grid = [];
            let opacityGrid = [];

            for (let y = 0; y < GRID_HEIGHT; y++) {
                const gridRow = [];
                const opacityRow = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    gridRow.push(Math.random() > 0.8 ? 1 : 0);
                    opacityRow.push(MAX_OPACITY);
                }
                grid.push(gridRow);
                opacityGrid.push(opacityRow);
            }

            let lastGenerationTime = Date.now();

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw cells
                for (let y = 0; y < GRID_HEIGHT; y++) {
                    for (let x = 0; x < GRID_WIDTH; x++) {
                        const cellValue = grid[y][x];
                        let cellOpacity = opacityGrid[y][x];

                        // Update opacity with transition
                        if (cellValue) {
                            if (cellOpacity < MAX_OPACITY) {
                                opacityGrid[y][x] = Math.min(MAX_OPACITY, cellOpacity + 0.1);
                            }
                        } else {
                            if (cellOpacity > 0) {
                                opacityGrid[y][x] = Math.max(0, cellOpacity - 0.1);
                            }
                        }

                        const currentOpacity = opacityGrid[y][x];
                        if (currentOpacity > 0) {
                            const gradient = ctx.createLinearGradient(
                                x * CELL_SIZE,
                                y * CELL_SIZE,
                                x * CELL_SIZE,
                                (y + 1) * CELL_SIZE
                            );
                            gradient.addColorStop(0, `rgba(255, 255, 255, ${currentOpacity})`);
                            gradient.addColorStop(1, `rgba(0, 0, 0, ${currentOpacity})`);
                            ctx.fillStyle = gradient;
                            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        } else {
                            ctx.fillStyle = DEAD_COLOR;
                            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        }
                    }
                }

                // Draw grid lines
                ctx.strokeStyle = "#777777";
                ctx.lineWidth = 1;

                for (let x = 0; x <= GRID_WIDTH; x++) {
                    ctx.beginPath();
                    ctx.moveTo(x * CELL_SIZE, 0);
                    ctx.lineTo(x * CELL_SIZE, canvas.height);
                    ctx.stroke();
                }

                for (let y = 0; y <= GRID_HEIGHT; y++) {
                    ctx.beginPath();
                    ctx.moveTo(0, y * CELL_SIZE);
                    ctx.lineTo(canvas.width, y * CELL_SIZE);
                    ctx.stroke();
                }
            }

            function countAliveNeighbors(x, y) {
                let count = 0;
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = (x + dx + GRID_WIDTH) % GRID_WIDTH;
                        const ny = (y + dy + GRID_HEIGHT) % GRID_HEIGHT;
                        count += grid[ny][nx];
                    }
                }
                return count;
            }

            function nextGeneration() {
                const newGrid = grid.map(arr => [...arr]);

                for (let y = 0; y < GRID_HEIGHT; y++) {
                    for (let x = 0; x < GRID_WIDTH; x++) {
                        const neighbors = countAliveNeighbors(x, y);
                        const alive = grid[y][x];

                        if (alive && (neighbors < 2 || neighbors > 3)) {
                            newGrid[y][x] = 0;
                        } else if (!alive && neighbors === 3) {
                            newGrid[y][x] = 1;
                        }
                    }
                }
                grid = newGrid;
            }

            function animate() {
                draw();

                const currentTime = Date.now();
                if (currentTime - lastGenerationTime >= GENERATION_INTERVAL) {
                    nextGeneration();
                    lastGenerationTime = currentTime;
                }

                setTimeout(() => requestAnimationFrame(animate), FRAME_RATE);
            }

            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        })();
    </script>
</body>

</html>
